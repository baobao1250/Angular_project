
    @if (isOpen) {
      <div 
        class="fixed inset-0 bg-slate-900/50 backdrop-blur-sm z-40 flex items-center justify-center p-4" 
        (click)="close()"
      >
        <div 
          class="bg-white rounded-2xl shadow-2xl w-full max-w-lg overflow-hidden flex flex-col transform transition-all" 
          (click)="$event.stopPropagation()"
        >
          
          <div class="px-6 py-4 border-b border-slate-100 flex justify-between items-center bg-slate-50">
            <h3 class="text-xl font-bold text-slate-800">
              <ng-content select="[modal-title]">Tiêu đề mặc định</ng-content>
            </h3>
            <button (click)="close()" class="text-slate-400 hover:text-red-500 text-3xl leading-none">&times;</button>
          </div>

          <div class="p-6 text-slate-600">
            <ng-content></ng-content>
          </div>

          <div class="px-6 py-4 border-t border-slate-100 bg-slate-50 flex justify-end gap-3">
            <ng-content select="[modal-footer]"></ng-content>
          </div>

        </div>
      </div>
    }
