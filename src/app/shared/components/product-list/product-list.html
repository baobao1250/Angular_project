<div class="max-w-4xl mx-auto p-4 md:p-8 font-sans">
  
  <div class="text-center mb-8">
    <h2 class="text-3xl font-bold text-slate-800 mb-2">🛍️ Khám phá Sản phẩm</h2>
    <p class="text-slate-500">Tìm kiếm siêu tốc độ với RxJS & Signals</p>
  </div>
  
  <div class="relative mb-8 flex items-center">
    <span class="absolute left-4 text-xl text-slate-400">🔍</span>
    <input 
      type="text" 
      [formControl]="searchControl" 
      placeholder="Nhập tên sản phẩm (VD: Apple)..."
      class="w-full py-4 pl-12 pr-4 text-base border-2 border-slate-200 rounded-xl outline-none transition-all duration-300 shadow-sm focus:border-blue-500 focus:ring-4 focus:ring-blue-500/20"
    />
  </div>

  @if (isLoading()) {
    <div class="text-center py-12 text-slate-500">
      <div class="w-10 h-10 mx-auto mb-4 border-4 border-slate-200 border-t-blue-500 rounded-full animate-spin"></div>
      <p class="font-medium">Đang quét dữ liệu...</p>
    </div>
  } @else {
    
    <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6">
      @for (item of products(); track item) {
        
        <div class="bg-white rounded-xl p-6 text-center border border-slate-100 shadow-sm hover:-translate-y-1 hover:shadow-xl transition-all duration-300">
          <div class="text-5xl mb-4">📦</div>
          <h3 class="text-lg font-semibold text-slate-800 mb-4">{{ item }}</h3>
          <button class="w-full bg-blue-50 text-blue-600 font-semibold py-2 px-4 rounded-lg hover:bg-blue-100 transition-colors">
            Xem chi tiết
          </button>
        </div>

      } @empty {
        
        <div class="col-span-full text-center py-12 text-slate-500">
          <div class="text-6xl mb-4">😢</div>
          <p class="text-lg font-medium">Không tìm thấy sản phẩm nào phù hợp!</p>
        </div>

      }
    </div>
  }
</div>
