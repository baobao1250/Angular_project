    <div class="max-w-md mx-auto mt-10 p-8 bg-white rounded-2xl shadow-xl font-sans text-center">
      
      @if (!authService.isLoggedIn()) {
        <h2 class="text-3xl font-bold text-slate-800 mb-6">Đăng Nhập</h2>
        <div class="space-y-4">
          <input [(ngModel)]="username" placeholder="Tên đăng nhập (gõ bừa)" class="w-full p-3 border rounded-lg outline-none focus:border-blue-500" />
          <input [(ngModel)]="password" type="password" placeholder="Mật khẩu (gõ bừa)" class="w-full p-3 border rounded-lg outline-none focus:border-blue-500" />
          
          <button 
            (click)="handleLogin()"
            class="w-full bg-blue-600 text-white font-bold py-3 rounded-lg hover:bg-blue-700 transition-all"
          >
            Đăng nhập để nhận Token
          </button>
        </div>
      } 
      
      @else {
        <h2 class="text-3xl font-bold text-green-600 mb-2">✅ Đã Đăng Nhập!</h2>
        <p class="text-slate-500 mb-6">Token đã được lưu ngầm trong trình duyệt.</p>
        
        <button 
          (click)="callProtectedApi()"
          class="w-full bg-indigo-600 text-white font-bold py-3 rounded-lg hover:bg-indigo-700 transition-all mb-4"
        >
          🚀 Gọi API Bảo Mật (Mở F12 -> Network)
        </button>

        <button 
          (click)="authService.logout()"
          class="w-full bg-red-100 text-red-600 font-bold py-3 rounded-lg hover:bg-red-200 transition-all"
        >
          Đăng Xuất (Xóa Token)
        </button>
      }

    </div>
